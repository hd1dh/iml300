<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Chinese Almanac</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main class="page1-main">
            <section class="almanac-card" aria-label="Daily Bazi">
                <div class="topdeco"><span class="red-box"></span></div>

                <div class="card-inner">
                    <a class="corner-label top-left" href="yi1.html">宜</a>
                    <a class="corner-label top-right" href="#">忌</a>

                    <a class="corner-label bottom-left" href="#">Do’s</a>
                    <a class="corner-label bottom-right" href="#">Don’t’s</a>

                    <div class="bazi-list left">
                        <p>Marriage</p>
                        <p>Travel</p>
                        <p>Rituals</p>
                        <p>Relocation</p>
                    </div>

                    <div class="middle-box">
                        <span class="red-bar"></span>
                        <span class="red-bar"></span>
                    </div>

                    <div class="middle-row">
                        <p>丁巳蛇年七月十三星期三<br />Wednesday, July 13, Year of the Ding Si</p>
                    </div>

                    <div class="bazi-list right">
                        <p>Commence Work</p>
                        <p>Burial</p>
                        <p>Earthworks</p>
                        <p>Construction</p>
                    </div>

                    <div class="date-grid">
                        <span>吉</span><span>吉</span><span>吉</span><span>凶</span> <span>吉</span><span>吉</span
                        ><span>凶</span><span>凶</span> <span>凶</span><span>凶</span><span>吉</span><span>吉</span>
                        <span>吉</span><span>日</span><span>凶</span><span>吉</span> <span>吉</span><span>吉</span
                        ><span>凶</span><span>凶</span><span>凶</span><span>凶</span><span>凶</span><span>凶</span>
                    </div>
                </div>

                <div class="bottomdeco"><span class="red-box"></span></div>
            </section>
        </main>
    </body>
</html>
