<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lily Holic</title>
        <link rel="stylesheet" href="style.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
        <style>
            body,
            html,
            * {
                background-image: none;
                background: transparent;
            }
        </style>
        <script src="backgroundcircle.js"></script>
    </head>
    <body class="use-p5-bg">
        <audio autoplay loop src="asset/Salyu.ogg"></audio>
        <header>
            <h1>Digital Diary</h1>
        </header>

        <nav class="sidebar" aria-label="Date navigation">
            <h2>Date</h2>

            <div class="date-nav">
                <div id="display-date" class="display-date">2004/3/4</div>

                <div class="date-controls">
                    <button id="prev-day" type="button" aria-label="Previous Day">◀ Previous Day</button>
                    <button id="next-day" type="button" aria-label="Next Day">Next Day ▶</button>
                </div>
            </div>

            <div class="note">
                Have a problem?<br />
                Contact manager: lily@phillia.com
            </div>

            <div class="function">
                <br />
                <a class="link" href="digitaldiary.html">Digital Diary</a><br />
                <a class="link" href="photolibrary.html">Photo Library</a>
            </div>
        </nav>
        <main class="content" role="main"></main>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const display = document.getElementById("display-date");
                const prevBtn = document.getElementById("prev-day");
                const nextBtn = document.getElementById("next-day");

                let current = new Date(2004, 2, 4);

                function formatSlash(d) {
                    const y = d.getFullYear();
                    const m = d.getMonth() + 1;
                    const day = d.getDate();
                    return y + "/" + m + "/" + day;
                }

                function setDate(d) {
                    current = new Date(d.getFullYear(), d.getMonth(), d.getDate());
                    display.textContent = formatSlash(current);
                }

                prevBtn.addEventListener("click", function () {
                    const prev = new Date(current);
                    prev.setDate(prev.getDate() - 1);
                    setDate(prev);
                });

                nextBtn.addEventListener("click", function () {
                    const next = new Date(current);
                    next.setDate(next.getDate() + 1);
                    setDate(next);
                });

                setDate(current);
            });
        </script>
    </body>
</html>
