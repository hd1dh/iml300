<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <link rel="stylesheet" href="homestyle.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

            href="https://fonts.googleapis.com/css2?family=Victor+Mono:ital,wght@0,100..700;1,100..700&display=swap"
            rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet" />

    <body class="bbs">
        <nav>
            <a href="home.html">Home</a>
            <a href="photo_library.html">Photo Library</a>
            <a href="AboutLily.html">About Lily</a>
        </nav>

        <main class="forum">
            <div class="entries">
                <div class="entry">
                    <h2 class="ltitle">
                        <a href="BBS1_album.html" class="next">「Breath」the blue</a
                        ><a href="BBS3.html" class="next1">「Erotica」the red</a>
                    </h2>
                </div>
            </div>
        </main>
        <script>
            const entries = document.querySelectorAll(".entry");
            let entryIndex = 0;

            function typeEntry(entry, callback) {
                const nodes = [];
                entry.querySelectorAll("p, h2").forEach((el) => {
                    nodes.push(el);
                });

                entry.style.opacity = 1;
                let nodeIndex = 0;

                function typeNode() {
                    if (nodeIndex >= nodes.length) {
                        setTimeout(callback, 50);
                        return;
                    }
                    const el = nodes[nodeIndex];
                    const text = el.innerHTML;
                    el.innerHTML = "";
                    el.style.visibility = "visible";
                    let i = 0;

                    const interval = setInterval(() => {
                        el.innerHTML = text.slice(0, i);
                        i++;
                        if (i > text.length) {
                            clearInterval(interval);
                            nodeIndex++;
                            typeNode();
                        }
                    }, 10);
                }
                typeNode();
            }

            function nextEntry() {
                if (entryIndex >= entries.length) return;
                const entry = entries[entryIndex];
                entryIndex++;
                typeEntry(entry, nextEntry);
            }

            entries.forEach((entry) => {
                entry.style.opacity = 0;
                entry.querySelectorAll("p, h2").forEach((el) => {
                    el.style.visibility = "hidden";
                });
            });

            nextEntry();
        </script>
    </body>
</html>
