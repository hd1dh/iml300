<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Firebase Text Input Demo</title>

    <script src="https://www.gstatic.com/firebasejs/8.2.3/firebase.js"></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <form id="text-input-form" onsubmit="return false">
        <input type="text" id="text-input-entry" placeholder="How are you?" />
        <input
          type="submit"
          id="text-input-submit"
          onclick="submitlock()"
          value="Share"
        />
      </form>
    </div>

    <div id="chat-container"></div>
  </body>
</html>
